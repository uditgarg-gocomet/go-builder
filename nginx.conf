events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s;

  upstream backend {
    server backend:3001;
  }

  upstream builder {
    server builder:3000;
  }

  upstream renderer {
    server renderer:3002;
  }

  # builder.localhost → App Builder
  server {
    listen 80;
    server_name builder.localhost;

    location / {
      proxy_pass http://builder;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # api.localhost → Core Backend
  server {
    listen 80;
    server_name api.localhost;

    location / {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # app.localhost → App Renderer
  server {
    listen 80;
    server_name app.localhost;

    location / {
      proxy_pass http://renderer;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
